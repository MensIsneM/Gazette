<script>
// 1. Removed the 'layout' property so the standard combo box generates
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'en,hi,ta,kn,te,ml,bn,mr'
  }, 'google_translate_element');
}
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
let googleCombo = null;

function waitForTranslate() {
  // Looks for the standard translate dropdown
  googleCombo = document.querySelector(".goog-te-combo");

  if (!googleCombo) {
    setTimeout(waitForTranslate, 500);
  }
}

waitForTranslate();

function changeLanguage(lang) {
  if (!googleCombo) {
    console.log("Google Translate not ready yet");
    return;
  }

  // Set the value to the chosen language
  googleCombo.value = lang;
  
  // 2. Added { bubbles: true } so Google's listener actually hears the change
  googleCombo.dispatchEvent(new Event("change", { bubbles: true }));
}
</script>
