id="datefn"
function getFormattedDate() {
  const d = new Date();
  const day = d.getDate();

  const suffix =
    day % 10 === 1 && day !== 11 ? "st" :
    day % 10 === 2 && day !== 12 ? "nd" :
    day % 10 === 3 && day !== 13 ? "rd" : "th";

  const month = d.toLocaleString("default", { month: "long" });
  const year = d.getFullYear();

  return `${day}${suffix} ${month}, ${year}`;
}

function handleEmailInput(el) {
  let value = el.value;

  // Remove spaces
  value = value.replace(/\s/g, '');

  // Lowercase (standard practice)
  value = value.toLowerCase();

  el.value = value;
}

function isValidEmail(email) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return regex.test(email);
}

function handlePhoneInput(el) {
  let value = el.value;

  // Always enforce +91 prefix
  if (!value.startsWith("+91 ")) {
    value = "+91 ";
  }

  // Remove everything except digits after +91
  let digits = value.slice(4).replace(/\D/g, '');

  // Limit to 10 digits (India standard)
  digits = digits.slice(0, 10);

  el.value = "+91 " + digits;
}

function toggleAlias() {
  const section = document.getElementById("alias_section");
  const checkbox = document.getElementById("use_alias");

  section.style.display = checkbox.checked ? "block" : "none";
}

}

function showGeneratedToast() {
  const toast = document.getElementById("gen-toast");

function calculateAge(dob) {
  if (!dob) return '';

  const birth = new Date(dob);
  const today = new Date();

  let age = today.getFullYear() - birth.getFullYear();

  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
    age--;
  }

  return age;
}

function formatNameWithAlias(full) {
  const parts = full.split(" alias ");

  return parts.map((p, i) => {
    return i === 0
      ? `<b>${p}</b>`
      : ` alias <b>${p}</b>`;
  }).join("");
}

function buildAlias(name, a1, a2) {
  const aliases = [a1, a2]
    .filter(x => x && x.trim() !== '')
    .map(x => x.toUpperCase());

  if (aliases.length === 0) return name.toUpperCase();

  // 🔥 alias stays lowercase
  return `${name.toUpperCase()} alias ${aliases.join(' alias ')}`;
}
